name: Daily Financial Briefing

on:
  schedule:
    # 北京时间 6:30 = UTC 22:30（前一天）
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch market data
        run: node scripts/fetch-data.js

      - name: Generate AI interpretation (DeepSeek)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/ai-interpret.js

      - name: Render HTML
        run: node scripts/render-html.js && node scripts/update-archive.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      - name: Save data to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/ dist/ -f
          git diff --staged --quiet || git commit -m "auto: daily briefing $(date +%Y-%m-%d)"
          git push origin main
