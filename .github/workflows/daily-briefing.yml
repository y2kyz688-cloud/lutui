name: Daily Financial Briefing

on:
  schedule:
    - cron: '30 22 * * *'  # 北京时间 6:30 AM
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 1-采集行情数据
        run: node scripts/fetch-data.js

      - name: 2-采集财经新闻
        run: node scripts/fetch-news.js
        continue-on-error: true

      - name: 3-DeepSeek AI生成解读
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/ai-generate.cjs

      - name: 4-渲染HTML页面
        run: |
          node scripts/render-html.js
          node scripts/update-archive.js

      - name: 5-部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      - name: 6-保存数据到主分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/ dist/ scripts/ prompts/ -f
          git diff --staged --quiet || git commit -m "auto: daily briefing $(date +%Y-%m-%d)"
          git push origin main
